name: MongoDB Snapshot Backup

on:
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    container: mongo:6.0
    steps:
      - uses: actions/checkout@v3
      - name: Install zip
        run: apt-get update && apt-get install -y zip
      - name: Create backup
        id: create_backup
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: bash ./create_backup.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mongo-backup
          path: ${{ steps.create_backup.outputs.ZIP_FILE }}

  upload:
    runs-on: ubuntu-latest
    needs: backup

    container:
      image: python:3.11

    steps:
      - uses: actions/checkout@v4

      - name: Download backup
        uses: actions/download-artifact@v4
        with:
          name: mongo-backup

      - name: test
        run: ls
