name: MongoDB Snapshot Backup

on:
    workflow_dispatch:
      inputs:
        environment:
          description: 'Choose environment'
          required: true
          default: 'production'

jobs:
    backup:
        runs-on: ubuntu-latest
        container: mongo:6.0
        steps:
            - name: Checkout
              uses: actions/checkout@v3

            - name: Install gdrive CLI
              run: |
                apt-get update && apt-get install -y curl
                curl -L -o /usr/local/bin/gdrive https://github.com/prasmussen/gdrive/releases/download/2.1.1/gdrive-linux-x64
                chmod +x /usr/local/bin/gdrive

            - name: Create MongoDB Backup
              env:
                MONGO_URI: ${{ secrets.MONGO_URI }}
              run: |
                TIMESTAMP=$(date +%Y_%m_%d_%H_%M)
                BACKUP_FILE="backup_$TIMESTAMP.gz"
                mongodump --uri="$MONGO_URI" --archive="$BACKUP_FILE" --gzip
                echo "Backup created: $BACKUP_FILE"

            - name: Upload to Google Drive
              uses: willo32/google-drive-upload-action@v1
              with:
                parent_folder_id: ${{ secrets.GDRIVE_FOLDER_ID }}
                target:: backup_*.gz
                credentials: ${{ secrets.GDRIVE_TOKEN }}