name: MongoDB Snapshot Backup

on:
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    container: mongo:6.0

    outputs:
      zip_file: ${{ steps.create_backup.outputs.ZIP_FILE }}

    steps:
      - uses: actions/checkout@v3

      - name: Install zip
        run: apt-get update && apt-get install -y zip

      - name: Create backup
        id: create_backup
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: bash ./create_backup.sh

      - name: Install Curl
        run: apt-get update && apt-get install -y curl

      - name: Upload backup
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ZIP_FILE: ${{ steps.create_backup.outputs.ZIP_FILE }}
        run: bash ./upload_backup.sh