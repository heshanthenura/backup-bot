name: MongoDB Snapshot Backup

on:
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    container: mongo:6.0
    steps:
      - uses: actions/checkout@v3
      - name: Install zip
        run: apt-get update && apt-get install -y zip
      - name: Create backup
        id: create_backup
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: bash ./create_backup.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: mongo-backup
          path: ${{ steps.create_backup.outputs.ZIP_FILE }}

  upload:
    runs-on: ubuntu-latest
    needs: backup
    steps:
      - uses: actions/checkout@v3
      - name: Download backup
        uses: actions/download-artifact@v3
        with:
          name: mongo-backup
      - name: Install Python
        run: apt-get update && apt-get install -y python3 python3-pip
      - name: Upload backup with Python
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ZIP_FILE: ${{ steps.create_backup.outputs.ZIP_FILE }}
        run: python3 upload_backup.py